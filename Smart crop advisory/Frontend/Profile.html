<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("land.jpeg") no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 450px;
      margin: 50px auto;
      padding: 20px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      color: white;
    }

    h2 {
      text-align: center;
    }

    .box {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
    }

    .card {
      margin: 12px 0;
      padding: 12px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Profile</h2>

  <div class="box" id="nameBox"></div>
  <div class="box" id="phoneBox"></div>

  <h3>History</h3>
  <div id="historyList"></div>

  <button onclick="goBack()">Go Back</button>
  <button onclick="clearHistory()">Clear History</button>

</div>

<script>

// 👤 USER
let user = JSON.parse(localStorage.getItem("user"));

if(user){
  document.getElementById("nameBox").innerHTML = "Name: " + user.name;
  document.getElementById("phoneBox").innerHTML = "Phone: " + user.phone;
}else{
  document.getElementById("nameBox").innerHTML = "Name: -";
  document.getElementById("phoneBox").innerHTML = "Phone: -";
}

// 📜 HISTORY
let history = JSON.parse(localStorage.getItem("history")) || [];

let html = "";

if(history.length === 0){
  html = "<p class='empty'>No history available</p>";
}
else{
  history.slice().reverse().forEach(item => {

    let fert = "";
    if(item.fertilizers){
      item.fertilizers.forEach(f=>{
        fert += `${f.name} - ${f.desc}<br>`;
      });
    }

    html += `
      <div class="card">
         ${item.crop}<br>
         ${item.current_temp}°C<br>
         ${item.current_humidity}%<br>
         ${item.recommended_temp}<br>
         ${item.recommended_humidity}<br>
         ${item.duration}<br>
         ${fert}
         ${item.advice}
      </div>
    `;
  });
}

document.getElementById("historyList").innerHTML = html;

// 🔙 BACK
function goBack(){
  window.history.back();
}

// 🧹 CLEAR
function clearHistory(){
  localStorage.removeItem("history");
  location.reload();
}

</script>

</body>
</html>
