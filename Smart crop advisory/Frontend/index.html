<!DOCTYPE html>
<html>
<head>
  <title>Smart Crop Advisory</title>

  <style> 
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🌾 Smart Crop Advisory</h2>

  <input type="text" id="name" placeholder="Enter your name">
  <input type="text" id="phone" placeholder="Phone number">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(name === "" || phone === "") {
    alert("Please fill all fields");
    return;
  }

  // Store user data (temporary)
  localStorage.setItem("name", name);
  localStorage.setItem("phone", phone);

  // Move to next page
  window.location.href = "home.html";
}
</script>

</body>
</html>
