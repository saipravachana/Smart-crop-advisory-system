<!DOCTYPE html>
<html>
<head>
  <title>SMART CROP ADVISORY</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;

      background: url("land.jpg") no-repeat center center/cover;

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      top: 0;
      left: 0;
    }

    .box {
      position: relative;
      background: rgba(255, 255, 255, 0.9);
      padding: 50px 40px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 15px black;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      width: 60%;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>SMART CROP ADVISORY</h2>

  <input id="name" placeholder="Enter your name">
  <input id="phone" placeholder="Enter phone number">

  <button onclick="login()">Continue</button>
</div>

<script>

function login() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(name === "" || phone === ""){
    alert("Please fill all fields");
    return;
  }

  // store user details
  localStorage.setItem("user", JSON.stringify({
    name: name,
    phone: phone
  }));

  // go to next page
  window.location.href = "secondpage.html";
}

</script>

</body>
</html>
