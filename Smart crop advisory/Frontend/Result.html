<!DOCTYPE html> <html> <head> <title>Crop Recommendation</title> <style> html, body { height: 100%; } body { margin: 0; font-family: Arial; min-height: 100vh; background: url("land.jpg") no-repeat center center; background-size: cover; } body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 0; } .container { position: relative; z-index: 1; width: 450px; margin: 60px auto; padding: 25px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 15px; color: white; } h2 { text-align: center; } .box { margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.15); border-radius: 10px; } button { width: 100%; margin-top: 15px; padding: 12px; background: green; color: white; border: none; border-radius: 8px; cursor: pointer; } .profile-icon { position: fixed; top: 15px; right: 20px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); border-radius: 50%; cursor: pointer; z-index: 1000; color: white; } .profile-icon:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); } </style> </head> <body> <div class="container"> <h2>Crop Recommendation</h2> <div class="box" id="cropBox"></div> <div class="box" id="tempBox"></div> <div class="box" id="humidityBox"></div> <div class="box" id="recTempBox"></div> <div class="box" id="recHumidityBox"></div> <div class="box" id="durationBox"></div> <div class="box" id="fertilizerBox"></div> <div class="box" id="adviceBox"></div> <button onclick="goBack()">Go Back</button> <div class="profile-icon" onclick="goProfile()">👤</div> </div>
<script>

  // 📦 Get stored result
  let data = JSON.parse(localStorage.getItem("result"));
  
  // 🧠 1. TOP-K + Sorting (Frontend DSA)
  let crops = data.top_crops || [data.best_crop];
  
  // Convert into objects (for sorting demonstration)
  let cropObjects = crops.map((c, i) => ({
    name: c,
    score: 100 - i * 10   // dummy score (backend already ranked)
  }));
  
  // Sorting (DSA)
  cropObjects.sort((a, b) => b.score - a.score);
  
  // Display crops
  let cropHTML = `<b>Top Recommended Crops:</b><br>`;
  cropObjects.forEach(c => {
    cropHTML += `🌾 ${c.name}<br>`;
  });
  
  document.getElementById("cropBox").innerHTML = cropHTML;
  
  
  // 🌡️ Temperature
  document.getElementById("tempBox").innerHTML =
    `<b>Current Temperature:</b> ${data.temperature}°C`;
  
  document.getElementById("humidityBox").innerHTML =
    `<b>Current Humidity:</b> ${data.humidity}%`;
  
  
  // 🔁 Recommended ranges (if available)
  document.getElementById("recTempBox").innerHTML =
    `<b>Recommended Temperature:</b> ${data.recommended_temp || "N/A"}`;
  
  document.getElementById("recHumidityBox").innerHTML =
    `<b>Recommended Humidity:</b> ${data.recommended_humidity || "N/A"}`;
  
  
  // ⏳ Duration
  document.getElementById("durationBox").innerHTML =
    `<b>Duration:</b> ${data.duration}`;
  
  
  
  // 🌱 Fertilizers
  let fertHTML = `<b>Fertilizers:</b><br>`;
  (data.fertilizers || []).forEach(f => {
    fertHTML += `${f.name}${f.desc ? " - " + f.desc : ""}<br>`;
  });
  document.getElementById("fertilizerBox").innerHTML = fertHTML;
  
  
  // 💡 Advice
  document.getElementById("adviceBox").innerHTML =
    `<b>Current Situation:</b> ${data.advice}`;
  
  
  
  // 🧠 2. STACK (History Feature - DSA)
  let historyStack = JSON.parse(localStorage.getItem("history")) || [];
  
  historyStack.push(data); // push = stack
  
  localStorage.setItem("history", JSON.stringify(historyStack));
  
  
  
  // 🔙 Back
  function goBack(){
    window.history.back();
  }
  
  // 👤 Profile
  function goProfile(){
    window.location.href = "profile.html";
  }
  
  </script>

</body>
</html>
